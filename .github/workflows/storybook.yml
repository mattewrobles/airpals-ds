name: Storybook → Chromatic

on:
  push:
    branches: [main]
    paths:
      - 'storybook/**'

jobs:
  chromatic:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        ds: [ds-default]
        # Add more DS here as you create them:
        # ds: [ds-default, ds-utransfer, ds-kaito]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: storybook/package-lock.json

      - name: Install all workspaces
        run: npm install --legacy-peer-deps
        working-directory: storybook

      - name: Publish ${{ matrix.ds }} to Chromatic
        uses: chromaui/action@latest
        with:
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          workingDir: storybook/packages/${{ matrix.ds }}
          buildScriptName: build-storybook
          exitZeroOnChanges: true
          exitOnceUploaded: true
