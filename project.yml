name: Prism
options:
  bundleIdPrefix: com.mau
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"

targets:
  Prism:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Prism
        excludes:
          - "**/*.md"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mau.prism
        PRODUCT_NAME: Prism
        INFOPLIST_FILE: Prism/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Prism/Resources/Prism.entitlements
        ENABLE_HARDENED_RUNTIME: YES
        SWIFT_EMIT_LOC_STRINGS: YES
    entitlements:
      path: Prism/Resources/Prism.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.files.user-selected.read-write: true
        com.apple.security.network.client: true
        com.apple.security.network.server: true
